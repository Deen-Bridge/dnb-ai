name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Run linting
        run: flake8 main.py stellar.py safety tests/redteam study.py fiqh.py hadith.py scripts/build_hadith_data.py --max-line-length=120 --ignore=E501,W503

      - name: Check syntax
        run: python -m compileall -q main.py stellar.py safety tests/redteam study.py fiqh.py hadith.py scripts/build_hadith_data.py

      - name: Run offline safety and red-team tests
        run: pytest -q tests/redteam

      - name: Run study generator tests
        run: pytest -q tests/test_study.py

      - name: Run semantic cache tests
        run: pytest -q tests/test_semantic_cache.py

      - name: Run fiqh tests
        run: pytest -q tests/test_fiqh.py

      - name: Run hadith grading tests
        run: pytest -q tests/test_hadith.py
