name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        run: |
          flake8 main.py feedback.py stellar.py scripts/export_eval_candidates.py \
            --max-line-length=120 --ignore=E501,W503

      - name: Check syntax
        run: |
          python -m py_compile main.py
          python -m py_compile feedback.py
          python -m py_compile stellar.py
          python -m py_compile scripts/export_eval_candidates.py

      - name: Run tests
        env:
          GEMINI_API_KEY: test-key
          ADMIN_TOKEN: test-admin-token
        run: pytest tests/ -v --tb=short
